<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CareerCraft — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="toast"></div>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-icon">CC</div>
      <div class="auth-brand-text">Career<span>Craft</span></div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="showTab('login')">Sign in</button>
      <button class="auth-tab" data-tab="signup" onclick="showTab('signup')">Create account</button>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="form-login" onsubmit="doLogin(event)">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to continue charting your career</div>
      <div class="id-toggle">
        <button type="button" class="active" data-mode="email" onclick="setIdMode('login','email')">Email</button>
        <button type="button" data-mode="phone" onclick="setIdMode('login','phone')">Phone</button>
      </div>
      <div class="form-group">
        <label class="form-label" id="loginIdLabel">Email address</label>
        <input class="form-control" id="loginId" type="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" id="loginPw" type="password" placeholder="Your password" required minlength="6"/>
      </div>
      <button class="auth-submit" type="submit"><i class="ti ti-login-2"></i> Sign in</button>
      <div class="auth-link"><a onclick="showForgot()">Forgot password?</a></div>
      <div class="auth-link">New here? <a onclick="showTab('signup')">Create an account</a></div>
    </form>

    <!-- SIGNUP -->
    <form class="auth-form" id="form-signup" onsubmit="doSignup(event)">
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Just a few details to get started</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">First name</label><input class="form-control" id="suFirst" placeholder="First name" required/></div>
        <div class="form-group"><label class="form-label">Last name</label><input class="form-control" id="suLast" placeholder="Last name" required/></div>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-control" id="suEmail" type="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Phone number</label>
        <input class="form-control" id="suPhone" type="tel" placeholder="+91 98765 43210" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" id="suPw" type="password" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input class="form-control" id="suPw2" type="password" placeholder="Confirm password" required minlength="6"/>
      </div>
      <button class="auth-submit" type="submit"><i class="ti ti-user-plus"></i> Create account</button>
      <div class="auth-link">Already have an account? <a onclick="showTab('login')">Sign in</a></div>
    </form>

    <!-- FORGOT -->
    <form class="auth-form" id="form-forgot" onsubmit="doForgot(event)">
      <div class="auth-title">Reset password</div>
      <div class="auth-sub">Enter your email or phone — we'll let you set a new password.</div>
      <div class="form-group">
        <label class="form-label">Email or phone</label>
        <input class="form-control" id="fgId" placeholder="you@example.com or +91…" required/>
      </div>
      <div class="form-group">
        <label class="form-label">New password</label>
        <input class="form-control" id="fgPw" type="password" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <button class="auth-submit" type="submit"><i class="ti ti-refresh"></i> Reset password</button>
      <div class="auth-link"><a onclick="showTab('login')">Back to sign in</a></div>
    </form>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
